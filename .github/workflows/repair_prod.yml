name: Repair Production Database

on:
  push:
    branches:
      - main

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Install Supabase CLI
        run: npm install -g supabase
      
      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      
      - name: Run SQL files directly against Production
        run: |
          psql "${{ secrets.SUPABASE_PRODUCTION_DB_URL }}" -f supabase/migrations/20260530000000_deactivation_and_auditing.sql
          psql "${{ secrets.SUPABASE_PRODUCTION_DB_URL }}" -f supabase/migrations/20260530000001_filter_deactivated_drilldowns.sql
          psql "${{ secrets.SUPABASE_PRODUCTION_DB_URL }}" -f supabase/migrations/20260530000002_hard_delete_club.sql
          psql "${{ secrets.SUPABASE_PRODUCTION_DB_URL }}" -f supabase/migrations/20260530000003_fixtures_is_active.sql
          
      - name: Mark as applied in Production history
        run: |
          supabase migration repair --status applied 20260530000000 20260530000001 20260530000002 20260530000003 --db-url "${{ secrets.SUPABASE_PRODUCTION_DB_URL }}"
